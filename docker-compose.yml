services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ckdos
      POSTGRES_PASSWORD: ckdos_dev_password
      POSTGRES_DB: ckdos
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ckdos -d ckdos"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
