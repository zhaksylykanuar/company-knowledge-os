name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16@sha256:081f1bc7bd5e143dbb6e487b710bbc27712cdcfaced4c071b8e47349aa1b4171
        env:
          POSTGRES_USER: ckdos
          POSTGRES_PASSWORD: ckdos_dev_password
          POSTGRES_DB: ckdos
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ckdos -d ckdos"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20

    env:
      DATABASE_URL: postgresql+asyncpg://ckdos:ckdos_dev_password@localhost:5432/ckdos

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Secret scan
        run: bash scripts/check_no_secrets.sh --tracked

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version-file: .python-version

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.11.23"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint
        run: uv run ruff check .

      - name: Apply migrations
        run: uv run alembic upgrade head

      - name: Tests
        run: uv run pytest -q

      - name: Prune uv cache
        if: always()
        run: uv cache prune --ci
